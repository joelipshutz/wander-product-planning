    <text class="ink body" x="22" y="70" font-weight="900">No cold account wall.</text>
    <text class="muted small" x="22" y="91">Login maps to save intent.</text>
    <text class="ink body" x="22" y="128" font-weight="900">No cold notif ask.</text>
    <text class="muted small" x="22" y="149">Prompt after a saved place.</text>
    <text class="ink body" x="22" y="186" font-weight="900">No early paywall.</text>
    <text class="muted small" x="22" y="207">Gate after free map value.</text>
