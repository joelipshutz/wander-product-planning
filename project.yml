name: Wander
options:
  bundleIdPrefix: com.grayline
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: Y7TVK75RZ8
    WANDER_CLERK_PUBLISHABLE_KEY: ""
    WANDER_CLERK_FRONTEND_API: growing-pheasant-22.clerk.accounts.dev
    WANDER_SUPABASE_URL: https://rugmtlgufrhlxwfkumhw.supabase.co
    WANDER_SUPABASE_PUBLISHABLE_KEY: ""
packages:
  clerk-ios:
    url: https://github.com/clerk/clerk-ios
    from: 1.1.3
  supabase-swift:
    url: https://github.com/supabase/supabase-swift.git
    from: 2.46.0
targets:
  Wander:
    type: application
    platform: iOS
    sources:
      - Wander
    configFiles:
      Debug: Wander/Config/Auth.xcconfig
      Release: Wander/Config/Auth.xcconfig
    info:
      path: Wander/Resources/Info.plist
      properties:
        WANDER_CLERK_FRONTEND_API: $(WANDER_CLERK_FRONTEND_API)
        WANDER_CLERK_PUBLISHABLE_KEY: $(WANDER_CLERK_PUBLISHABLE_KEY)
        WANDER_SUPABASE_PUBLISHABLE_KEY: $(WANDER_SUPABASE_PUBLISHABLE_KEY)
        WANDER_SUPABASE_URL: $(WANDER_SUPABASE_URL)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSLocationWhenInUseUsageDescription: Wander uses your location once to suggest nearby places. It never broadcasts live location.
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grayline.wander
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "10"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Wander/Resources/Wander.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: clerk-ios
        product: ClerkKit
      - package: clerk-ios
        product: ClerkKitUI
      - package: supabase-swift
        product: Supabase
  WanderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WanderTests
    dependencies:
      - target: Wander
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grayline.wander.tests
