      <rect class="brown" x="17" y="207" width="28" height="20" rx="3"/>
      <circle fill="#fff8ed" cx="31" cy="217" r="5"/>
      <text class="ink body" x="55" y="220" font-weight="800">From a photo</text>
    </g>
    <text class="secondary" x="91" y="514">Explore first</text>
  </g>

  <!-- Phone 5 -->
