    <text class="ink h" x="31" y="248">local.</text>
    <text class="muted body" x="31" y="282">Detect where you are</text>
    <text class="muted body" x="31" y="302">and sort nearby recs.</text>
    <rect class="panel" x="31" y="332" width="186" height="94" rx="16"/>
    <line class="grid" x1="45" y1="365" x2="203" y2="365"/>
    <line class="grid" x1="96" y1="332" x2="96" y2="426"/>
    <circle class="red" cx="74" cy="362" r="12"/>
    <circle class="sky" cx="112" cy="383" r="7"/>
    <circle class="sage" cx="163" cy="398" r="12"/>
    <rect class="cta" x="31" y="456" width="186" height="40" rx="12"/>
    <text class="ctaText" x="82" y="481">Allow location</text>
    <text class="secondary" x="104" y="514">Not now</text>
  </g>

  <!-- Phone 3 -->
  <g transform="translate(734,240)">
