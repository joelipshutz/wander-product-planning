<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1420" viewBox="0 0 1500 1420">
  <defs>
    <style>
      .canvas { fill: #f5eddf; }
      .ink { fill: #261a14; font-family: Arial, Helvetica, sans-serif; }
      .muted { fill: #75685c; font-family: Arial, Helvetica, sans-serif; }
      .phone { fill: #181614; }
      .screen { fill: #fff8ed; }
      .panel { fill: #fffdf7; stroke: #e3d6c3; stroke-width: 1.2; }
      .soft { fill: #efe3d0; }
      .mapA { fill: #dfe6d1; }
      .mapB { fill: #d4e5df; }
      .grid { stroke: #cbd3bf; stroke-width: 1; opacity: .7; }
      .road { stroke: #fffaf0; stroke-width: 5; stroke-linecap: round; }
      .title { font-size: 38px; font-weight: 900; letter-spacing: 0; }
      .subtitle { font-size: 17px; letter-spacing: 0; }
      .kicker { font-size: 10px; font-weight: 800; letter-spacing: .8px; }
      .h { font-size: 26px; font-weight: 900; letter-spacing: 0; }
      .body { font-size: 14px; letter-spacing: 0; }
      .small { font-size: 12px; letter-spacing: 0; }
      .tiny { font-size: 10px; letter-spacing: 0; }
      .cta { fill: #e45735; }
      .ctaText { fill: #fffaf4; font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 800; }
      .secondary { fill: #75685c; font-family: Arial, Helvetica, sans-serif; font-size: 12px; }
      .chip { fill: #fffdf7; stroke: #ded1bd; stroke-width: 1.1; }
      .chipOn { fill: #382215; }
      .chipText { fill: #261a14; font-family: Arial, Helvetica, sans-serif; font-size: 11px; font-weight: 800; }
      .chipTextOn { fill: #fffaf4; font-family: Arial, Helvetica, sans-serif; font-size: 11px; font-weight: 800; }
      .red { fill: #e45735; }
      .sage { fill: #91a884; }
      .sky { fill: #6aaece; }
      .gold { fill: #e7c459; }
      .brown { fill: #382215; }
      .line { stroke: #382215; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .whiteLine { stroke: #fffaf4; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <rect class="canvas" width="1500" height="1420"/>
  <text class="ink title" x="52" y="58">recommended Wander onboarding</text>
  <text class="muted subtitle" x="54" y="88">map-first, guest-first, location early, auth on save, notifications after value, paywall after 20 saves</text>

  <g transform="translate(52,124)">
    <rect class="panel" x="0" y="0" width="1396" height="70" rx="18"/>
    <text class="ink body" x="24" y="28" font-weight="800">Recommended order</text>
    <text class="muted body" x="24" y="52">First-run: promise -> location -> taste -> add-place education. Triggered later: auth when saving, notifications after first save, paywall at save #21.</text>
  </g>

  <!-- Phone 1 -->
  <g transform="translate(50,240)">
    <rect class="phone" width="248" height="532" rx="44"/>
    <rect class="screen" x="13" y="13" width="222" height="506" rx="34"/>
    <rect x="87" y="25" width="74" height="22" rx="11" fill="#181614"/>
    <text class="tiny ink" x="33" y="42" font-weight="800">9:41</text>
    <g transform="translate(31,66)">
