    <rect class="screen" x="13" y="13" width="222" height="506" rx="34"/>
    <rect x="87" y="25" width="74" height="22" rx="11" fill="#181614"/>
    <text class="tiny ink" x="33" y="42" font-weight="800">9:41</text>
    <text class="muted kicker" x="31" y="86">7 / SAVE #21</text>
    <text class="ink h" x="31" y="124">Your map is</text>
    <text class="ink h" x="31" y="154">filling up.</text>
    <text class="muted body" x="31" y="188">20 places are free.</text>
    <text class="muted body" x="31" y="208">Go unlimited when Wander</text>
    <text class="muted body" x="31" y="228">becomes your real map.</text>
    <rect class="soft" x="31" y="262" width="186" height="12" rx="6"/>
    <rect class="red" x="31" y="262" width="186" height="12" rx="6"/>
    <text class="muted small" x="81" y="296">20/20 free saves used</text>
    <g transform="translate(38,330)">
