    <text class="muted body" x="31" y="294">Create a free account to</text>
    <text class="muted body" x="31" y="314">keep it synced and share recs.</text>
    <rect class="panel" x="31" y="350" width="186" height="39" rx="12"/>
    <text class="ink body" x="75" y="375" font-weight="800">Continue with Apple</text>
    <rect class="panel" x="31" y="400" width="186" height="39" rx="12"/>
    <text class="ink body" x="73" y="425" font-weight="800">Continue with Google</text>
    <rect class="panel" x="31" y="450" width="186" height="39" rx="12"/>
    <text class="ink body" x="78" y="475" font-weight="800">Continue with email</text>
    <text class="secondary" x="85" y="514">Keep browsing</text>
  </g>

  <!-- Phone 6 -->
