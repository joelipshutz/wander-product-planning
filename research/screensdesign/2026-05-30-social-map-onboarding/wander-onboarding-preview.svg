    <text class="body muted" x="34" y="285">trip ideas you asked for.</text>
    <rect class="panel" x="28" y="315" width="194" height="43" rx="12"/>
    <circle class="terracotta" cx="50" cy="336" r="10"/><text class="small ink" x="68" y="341">Ryan saved nearby</text>
    <rect class="panel" x="28" y="367" width="194" height="43" rx="12"/>
    <circle class="gold" cx="50" cy="389" r="10"/><text class="small ink" x="68" y="394">Croatia trip idea</text>
