      <rect class="chip" x="96" y="0" width="100" height="34" rx="17"/><text class="chipText" x="110" y="22">🍜 restaurants</text>
      <rect class="chipOn" x="0" y="46" width="74" height="34" rx="17"/><text class="chipTextOn" x="13" y="68">🥾 hikes</text>
      <rect class="chip" x="84" y="46" width="70" height="34" rx="17"/><text class="chipText" x="100" y="68">🍸 bars</text>
      <rect class="chip" x="0" y="92" width="78" height="34" rx="17"/><text class="chipText" x="14" y="114">🌳 parks</text>
      <rect class="chipOn" x="88" y="92" width="112" height="34" rx="17"/><text class="chipTextOn" x="101" y="114">💻 work cafes</text>
      <rect class="chip" x="0" y="138" width="96" height="34" rx="17"/><text class="chipText" x="13" y="160">🧘 wellness</text>
      <rect class="chip" x="106" y="138" width="82" height="34" rx="17"/><text class="chipText" x="120" y="160">💦 nature</text>
