      <line class="grid" x1="65" y1="0" x2="65" y2="206"/>
      <line class="grid" x1="129" y1="0" x2="129" y2="206"/>
      <path class="road" d="M0,129 C44,111 74,125 113,111 C142,101 159,88 186,82"/>
      <path class="road" d="M100,0 C101,61 101,123 94,206"/>
      <circle class="red" cx="54" cy="96" r="17"/>
      <circle class="sky" cx="107" cy="128" r="6"/>
      <circle class="sage" cx="146" cy="61" r="16"/>
      <circle class="gold" cx="157" cy="158" r="16"/>
    </g>
    <text class="muted kicker" x="31" y="304">1 / PROMISE</text>
    <text class="ink h" x="31" y="342">Your places,</text>
    <text class="ink h" x="31" y="372">on a map.</text>
    <text class="muted body" x="31" y="404">Save spots you have been,</text>
    <text class="muted body" x="31" y="424">want to try, or got from friends.</text>
    <rect class="cta" x="31" y="456" width="186" height="40" rx="12"/>
    <text class="ctaText" x="74" y="481">Start with the map</text>
  </g>

  <!-- Phone 2 -->
  <g transform="translate(392,240)">
    <rect class="phone" width="248" height="532" rx="44"/>
    <rect class="screen" x="13" y="13" width="222" height="506" rx="34"/>
    <rect x="87" y="25" width="74" height="22" rx="11" fill="#181614"/>
