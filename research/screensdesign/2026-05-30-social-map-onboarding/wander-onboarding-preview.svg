    <text class="body ink" x="96" y="219" font-weight="800">Maru Coffee</text>
    <text class="small muted" x="96" y="241">arts district · coffee</text>
    <text class="body muted" x="28" y="301">Create a free account to</text>
    <text class="body muted" x="28" y="322">keep places synced and</text>
    <text class="body muted" x="28" y="343">share recs with friends.</text>
    <rect class="ghostBtn" x="28" y="374" width="194" height="42" rx="12"/><text class="body ink" x="73" y="400" font-weight="800">Continue with Apple</text>
    <rect class="ghostBtn" x="28" y="426" width="194" height="42" rx="12"/><text class="body ink" x="73" y="452" font-weight="800">Continue with email</text>
    <text class="small muted" x="84" y="502">Keep browsing</text>
  </g>

  <!-- Phone 7 -->
  <g transform="translate(910,750)">
    <rect class="phone" x="0" y="0" width="250" height="540" rx="44"/>
    <rect class="screen" x="13" y="13" width="224" height="514" rx="34"/>
    <rect x="88" y="25" width="74" height="22" rx="11" fill="#181614"/>
    <text class="tiny ink" x="34" y="42" font-weight="700">9:41</text>
    <text class="tiny muted" x="28" y="82" font-weight="800">AFTER SAVE #21</text>
    <text class="h ink" x="28" y="126">Your map is</text>
    <text class="h ink" x="28" y="157">filling up.</text>
    <text class="body muted" x="28" y="189">20 places are free. Go</text>
    <text class="body muted" x="28" y="210">unlimited when Wander</text>
    <text class="body muted" x="28" y="231">becomes your real map.</text>
    <rect class="soft" x="28" y="260" width="194" height="12" rx="6"/>
    <rect class="terracotta" x="28" y="260" width="194" height="12" rx="6"/>
    <text class="small muted" x="81" y="292">20/20 free saves used</text>
    <g transform="translate(35,322)">
      <circle class="terracotta" cx="7" cy="0" r="5"/><text class="body ink" x="22" y="5">Unlimited saves</text>
      <circle class="terracotta" cx="7" cy="34" r="5"/><text class="body ink" x="22" y="39">Unlimited link imports</text>
      <circle class="terracotta" cx="7" cy="68" r="5"/><text class="body ink" x="22" y="73">Private friend circles</text>
      <circle class="terracotta" cx="7" cy="102" r="5"/><text class="body ink" x="22" y="107">Trip packs + backup</text>
    </g>
    <rect class="cta" x="24" y="462" width="202" height="42" rx="12"/>
    <text class="ctaText" x="86" y="488">Go unlimited</text>
    <text class="small muted" x="101" y="518">Not now</text>
  </g>

  <g transform="translate(1225,790)">
    <rect class="panel" x="0" y="0" width="220" height="280" rx="20"/>
    <text class="tiny muted" x="20" y="34" font-weight="800">FLOW PRINCIPLES</text>
    <text class="body ink" x="20" y="68" font-weight="800">1. Show the map first.</text>
    <text class="body ink" x="20" y="104" font-weight="800">2. Explain permissions.</text>
    <text class="body ink" x="20" y="140" font-weight="800">3. Tune Discover lightly.</text>
    <text class="body ink" x="20" y="176" font-weight="800">4. Gate auth on save.</text>
    <text class="body ink" x="20" y="212" font-weight="800">5. Paywall after value.</text>
    <text class="small muted" x="20" y="248">Keep copy useful, not cute.</text>
