<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1360" viewBox="0 0 1500 1360">
  <defs>
    <style>
      .bg { fill: #f5eddf; }
      .ink { fill: #261a14; font-family: Arial, Helvetica, sans-serif; }
      .muted { fill: #766b60; font-family: Arial, Helvetica, sans-serif; }
      .tiny { font-size: 11px; letter-spacing: 0; }
      .small { font-size: 13px; letter-spacing: 0; }
      .body { font-size: 15px; letter-spacing: 0; }
      .h { font-size: 26px; font-weight: 800; letter-spacing: 0; }
      .phone { fill: #181614; }
      .screen { fill: #fff8ed; }
      .panel { fill: #fffdf7; stroke: #e3d8c7; stroke-width: 1.2; }
      .map { fill: #dfe5d0; }
      .map2 { fill: #d3e3dc; }
      .road { stroke: #fffef7; stroke-width: 4; opacity: .9; }
      .grid { stroke: #c9d0bc; stroke-width: 1; opacity: .55; }
      .cta { fill: #e45735; }
      .ctaText { fill: #fffaf4; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; }
      .ghostBtn { fill: #fffdf7; stroke: #e2d5c2; stroke-width: 1.2; }
      .chip { fill: #fffdf7; stroke: #ded1bd; stroke-width: 1.1; }
      .chipOn { fill: #382215; }
      .chipText { fill: #261a14; font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; }
      .chipTextOn { fill: #fffaf4; font-family: Arial, Helvetica, sans-serif; font-size: 12px; font-weight: 700; }
      .terracotta { fill: #e45735; }
      .sage { fill: #a9b69f; }
      .sky { fill: #70afd0; }
      .gold { fill: #e7c459; }
      .espresso { fill: #382215; }
      .soft { fill: #efe4d2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="1360"/>
  <text class="ink" x="48" y="56" font-size="38" font-weight="900">wander onboarding preview</text>
  <text class="muted" x="50" y="86" font-size="17">guest-first flow: location + notifications, no login until save intent, freemium after 20 saved places</text>

  <!-- Phone 1 -->
  <g transform="translate(45,125)">
    <rect class="phone" x="0" y="0" width="250" height="540" rx="44"/>
    <rect class="screen" x="13" y="13" width="224" height="514" rx="34"/>
    <rect x="88" y="25" width="74" height="22" rx="11" fill="#181614"/>
    <text class="tiny ink" x="34" y="42" font-weight="700">9:41</text>
    <g transform="translate(23,67)">
      <rect class="map" x="0" y="0" width="204" height="248" rx="24"/>
      <rect class="map2" x="112" y="0" width="92" height="248" rx="24"/>
      <line class="grid" x1="0" y1="62" x2="204" y2="62"/>
      <line class="grid" x1="0" y1="126" x2="204" y2="126"/>
      <line class="grid" x1="68" y1="0" x2="68" y2="248"/>
      <line class="grid" x1="138" y1="0" x2="138" y2="248"/>
      <path class="road" d="M0,155 C45,138 80,148 124,137 C158,128 181,111 204,105"/>
      <path class="road" d="M108,0 C104,54 111,105 104,162 C101,194 100,222 103,248"/>
      <circle class="terracotta" cx="54" cy="102" r="18"/>
      <text x="46" y="108" font-size="17">☕</text>
      <circle class="sage" cx="139" cy="66" r="18"/>
      <text x="132" y="72" font-size="16">🌲</text>
      <circle class="gold" cx="151" cy="174" r="18"/>
      <text x="145" y="180" font-size="15">🍜</text>
      <circle class="sky" cx="98" cy="139" r="6"/>
    </g>
    <text class="tiny muted" x="24" y="346" font-weight="800">WELCOME</text>
    <text class="h ink" x="24" y="381">Keep your places</text>
    <text class="h ink" x="24" y="412">worth revisiting.</text>
    <text class="body muted" x="24" y="441">Save recs from people</text>
    <text class="body muted" x="24" y="462">you actually trust.</text>
    <rect class="cta" x="24" y="480" width="202" height="42" rx="12"/>
    <text class="ctaText" x="72" y="506">Start with the map</text>
