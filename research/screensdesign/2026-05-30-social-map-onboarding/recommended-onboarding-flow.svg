    <text class="muted body" x="31" y="302">and friend recs nearby.</text>
    <rect class="panel" x="31" y="335" width="186" height="40" rx="12"/>
    <circle class="red" cx="52" cy="355" r="8"/>
    <text class="ink small" x="68" y="359">You are near Maru Coffee</text>
    <rect class="panel" x="31" y="386" width="186" height="40" rx="12"/>
    <circle class="gold" cx="52" cy="406" r="8"/>
    <text class="ink small" x="68" y="410">Ryan saved nearby</text>
    <rect class="cta" x="31" y="456" width="186" height="40" rx="12"/>
    <text class="ctaText" x="68" y="481">Turn on notifications</text>
    <text class="secondary" x="97" y="514">Maybe later</text>
  </g>

  <!-- Phone 7 -->
