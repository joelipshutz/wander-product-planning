      <text x="17" y="36" font-size="24">📍</text><text class="ctaText" x="52" y="25">I'm here right now</text><text x="52" y="45" fill="#ffe3d8" font-size="11" font-family="Arial">Maru Coffee detected</text>
      <rect class="panel" x="0" y="72" width="198" height="52" rx="16"/>
      <text x="17" y="105" font-size="23">🔗</text><text class="body ink" x="52" y="101" font-weight="800">Paste a link</text>
      <rect class="panel" x="0" y="138" width="198" height="52" rx="16"/>
      <text x="17" y="171" font-size="23">✍️</text><text class="body ink" x="52" y="167" font-weight="800">Add manually</text>
      <rect class="panel" x="0" y="204" width="198" height="52" rx="16"/>
      <text x="17" y="237" font-size="23">📷</text><text class="body ink" x="52" y="233" font-weight="800">From a photo</text>
    </g>
  </g>

  <!-- Phone 6 -->
