    <text class="h ink" x="36" y="221">nearby.</text>
    <text class="body muted" x="36" y="253">Use location to detect</text>
    <text class="body muted" x="36" y="274">where you are adding,</text>
    <text class="body muted" x="36" y="295">then sort recs around you.</text>
    <rect class="panel" x="35" y="322" width="180" height="92" rx="16"/>
    <line class="grid" x1="50" y1="354" x2="200" y2="354"/>
    <line class="grid" x1="97" y1="322" x2="97" y2="414"/>
    <circle class="sky" cx="114" cy="371" r="7"/>
    <circle class="terracotta" cx="76" cy="352" r="12"/>
    <circle class="sage" cx="160" cy="386" r="12"/>
    <rect class="cta" x="24" y="445" width="202" height="42" rx="12"/>
    <text class="ctaText" x="80" y="471">Allow location</text>
    <text class="small muted" x="103" y="506">Not now</text>
  </g>

  <!-- Phone 3 -->
  <g transform="translate(735,125)">
    <rect class="phone" x="0" y="0" width="250" height="540" rx="44"/>
    <rect class="screen" x="13" y="13" width="224" height="514" rx="34"/>
    <rect x="88" y="25" width="74" height="22" rx="11" fill="#181614"/>
    <text class="tiny ink" x="34" y="42" font-weight="700">9:41</text>
    <circle class="sky" cx="125" cy="102" r="38"/>
