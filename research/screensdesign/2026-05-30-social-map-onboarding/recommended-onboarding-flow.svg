      <rect class="panel" x="0" y="129" width="186" height="47" rx="15"/>
      <path class="line" d="M21 157 L35 143 L43 151 L29 165 L20 166 Z"/>
      <text class="ink body" x="55" y="159" font-weight="800">Add manually</text>
