name: Wander
options:
  bundleIdPrefix: com.grayline
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Wander:
    type: application
    platform: iOS
    sources:
      - Wander
    info:
      path: Wander/Resources/Info.plist
      properties:
        CFBundleDisplayName: Wander
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grayline.wander
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  WanderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WanderTests
    dependencies:
      - target: Wander
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grayline.wander.tests
