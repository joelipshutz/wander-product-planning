      <rect class="chip" x="77" y="47" width="62" height="33" rx="17"/>
      <circle class="gold" cx="94" cy="63" r="5"/><text class="chipText" x="106" y="68">bars</text>
      <rect class="chip" x="0" y="94" width="66" height="33" rx="17"/>
      <circle class="sage" cx="17" cy="110" r="5"/><text class="chipText" x="29" y="115">parks</text>
